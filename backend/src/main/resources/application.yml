spring:
  application:
    name: mcly-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/mcly
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
